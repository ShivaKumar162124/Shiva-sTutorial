<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiva's Solutions – Web Development</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0A1929;
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 50px 30px;
            text-align: center;
        }

        h1 {
            font-size: 56px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #FFFFFF 0%, #FFD700 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
        }

        .tagline {
            font-size: 24px;
            color: #FFD700;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .services {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px 40px;
            margin: 30px 0;
            text-align: left;
            display: inline-block;
            min-width: 300px;
            border-left: 4px solid #FFD700;
        }

        .services li {
            margin: 15px 0;
            font-size: 18px;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .services li::before {
            content: "✅";
            color: #FFD700;
        }

        .cta {
            display: inline-block;
            background: #FFD700;
            color: #0A1929;
            padding: 14px 40px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            border-radius: 40px;
            margin: 20px 0 40px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .cta:hover {
            transform: scale(1.05);
            background: #FFC107;
        }

        .footer {
            font-size: 13px;
            color: #8892B0;
            margin-top: 30px;
            line-height: 1.6;
        }

        .hashtags {
            margin-top: 15px;
            font-size: 12px;
            color: #5A6B8C;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 36px;
            }
            .tagline {
                font-size: 18px;
            }
            .services {
                padding: 20px;
            }
            .services li {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SHIVA'S SOLUTIONS</h1>
        <div class="tagline">NOW OPEN</div>

        <div class="services">
            <li>Affordable website development</li>
            <li>Fast delivery (3–7 days)</li>
            <li>Responsive design</li>
            <li>No hidden charges</li>
        </div>

        <a href="https://wa.me/916308093654" class="cta">DM FOR DETAILS</a>

        <div class="footer">
            <strong>Somu Shiva Kumar</strong><br>
            Founder, Shiva's Solutions
        </div>

        <div class="hashtags">
            #ShivasSolutions #WebDevelopment #SmallBusiness #Hyderabad
        </div>
    </div>
</body>
</html>
